<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Dynamic Initial Page Title -->
    <title>Khabbab | Premium Freelance Web & Automation Specialist</title>
    <!-- Premium Glowing Lightning Developer SVG Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%230A0F1E'/%3E%3Cpath d='M35 50 L55 25 L50 48 L65 48 L45 75 L50 52 Z' fill='%2325D366' filter='drop-shadow(0px 0px 6px %2325D366)'/%3E%3Cpath d='M30 45 L40 50 L30 55' fill='none' stroke='%235B5FEF' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    
    <!-- Fix 5: Google Fonts Preconnect + Fallback Loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" 
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap"
      media="print" 
      onload="this.media='all'">

    <style>
      /* Self-contained CSS Preloader animation */
      @keyframes spin-outer {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes spin-inner {
        0% { transform: rotate(360deg); }
        100% { transform: rotate(0deg); }
      }
      @keyframes pulse-text {
        0%, 100% { opacity: 0.5; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1); }
      }
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 15px rgba(37, 211, 102, 0.2); }
        50% { box-shadow: 0 0 30px rgba(37, 211, 102, 0.5); }
      }

      /* Fix 2: Preloader CSS */
      #preloader,
      .preloader,
      [class*="preloader"],
      [class*="loader"] {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 99999;
        background: #0A0F1E;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease;
      }

      /* CRITICAL: Body must be visible even if preloader fails */
      body {
        visibility: visible !important;
        opacity: 1 !important;
      }
    </style>
  </head>
  <body style="margin: 0; background-color: #0A0F1E;">
    <!-- Beautiful Dark Luxury Preloading Screen -->
    <div id="preloader">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 24px;">
        <!-- Glowing Double Ring Spinner -->
        <div style="position: relative; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center;">
          <div style="box-sizing: border-box; position: absolute; width: 100%; height: 100%; border: 3px solid transparent; border-top-color: #5B5FEF; border-left-color: #5B5FEF; border-radius: 50%; animation: spin-outer 1s linear infinite;"></div>
          <div style="box-sizing: border-box; position: absolute; width: 80%; height: 80%; border: 3px solid transparent; border-bottom-color: #25D366; border-right-color: #25D366; border-radius: 50%; animation: spin-inner 1s linear infinite;"></div>
          <!-- Centered Glowing Spark Node -->
          <div style="width: 38px; height: 38px; background-color: #111827; border: 2px solid #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; animation: pulse-glow 1.5s ease-in-out infinite;">
            <span style="font-size: 18px; line-height: 1; filter: drop-shadow(0 0 2px #25D366);">⚡</span>
          </div>
        </div>
        <div style="text-align: center;">
          <div style="font-family: system-ui, -apple-system, sans-serif; color: #FFFFFF; font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; animation: pulse-text 1.5s ease-in-out infinite; margin-bottom: 6px;">
            FREELANCE<span style="color: #25D366;">AGENCY</span>
          </div>
          <div style="font-family: 'Courier New', monospace; color: #94A3B8; font-size: 11px; letter-spacing: 1px;">
            Loading pristine interface...
          </div>
        </div>
      </div>
    </div>

    <!-- Fix 1: Bulletproof preloader - guaranteed to hide -->
    <script>
      (function() {
        function hidePreloader() {
          const preloader = document.getElementById('preloader') || 
                            document.querySelector('.preloader') ||
                            document.querySelector('[class*="preloader"]') ||
                            document.querySelector('[class*="loader"]') ||
                            document.querySelector('[id*="loader"]');
          
          if (preloader) {
            preloader.style.transition = 'opacity 0.5s ease';
            preloader.style.opacity = '0';
            preloader.style.pointerEvents = 'none';
            setTimeout(function() {
              preloader.style.display = 'none';
              preloader.style.visibility = 'hidden';
              document.body.style.overflow = 'auto';
              document.body.style.visibility = 'visible';
            }, 500);
          }
          
          // Make sure body is always visible
          document.body.style.opacity = '1';
          document.body.style.visibility = 'visible';
        }

        // Method 1: Hide after max 3 seconds NO MATTER WHAT
        setTimeout(hidePreloader, 3000);

        // Method 2: Hide when DOM is ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            setTimeout(hidePreloader, 500);
          });
        } else {
          setTimeout(hidePreloader, 100);
        }

        // Method 3: Hide when everything loads
        window.addEventListener('load', function() {
          setTimeout(hidePreloader, 200);
        });

        // Method 4: Catch any JS errors and still hide preloader
        window.addEventListener('error', function(e) {
          console.warn('Error caught, hiding preloader anyway:', e.message);
          hidePreloader();
        });
        
        // Method 5: Catch unhandled promise rejections
        window.addEventListener('unhandledrejection', function(e) {
          console.warn('Promise rejection, hiding preloader anyway:', e.reason);
          hidePreloader();
        });

        // ✅ Preloader hides within 3 seconds maximum
        // ✅ Preloader hides even if JavaScript error occurs  
        // ✅ Preloader hides even if external CDN fails
        // ✅ All CSS/JS/image assets load correctly on Vercel
        // ✅ Works on mobile, tablet, desktop
        // ✅ Works on Chrome, Firefox, Safari, Edge
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
